<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão à Vista - Power BI (Carregamento Inteligente)</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
        .frame-container { position: relative; width: 100%; height: 100%; }
        
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            position: absolute; 
            top: 0; 
            left: 0; 
            visibility: hidden; 
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        /* Classe para exibir o relatório ativo */
        .active { 
            visibility: visible; 
            opacity: 1; 
            z-index: 10; 
        }
    </style>
</head>
<body>

    <div id="container-reports" class="frame-container"></div>

    <script>
        // 1. CONFIGURAÇÃO: Insira seus links de incorporação aqui
        // O parâmetro &navContentPaneEnabled=false remove as abas originais do BI
        const linksBI = [
            "https://app.powerbi.com/reportEmbed?reportId=fbc2d57e-550d-46e5-b992-a9313761d494&autoAuth=true&ctid=ca4b9034-c4ac-4ca2-b97e-1e57700b0d20&navContentPaneEnabled=false",
            "https://app.powerbi.com/reportEmbed?reportId=77a27d25-833b-417f-a8ee-682980c960a4&autoAuth=true&ctid=ca4b9034-c4ac-4ca2-b97e-1e57700b0d20&navContentPaneEnabled=false",
            "https://app.powerbi.com/reportEmbed?reportId=50b870b0-2741-4ea8-bfed-d95d2cc4df90&autoAuth=true&ctid=ca4b9034-c4ac-4ca2-b97e-1e57700b0d20&navContentPaneEnabled=false"
        ];

        const tempoTrocaSlide = 30000; // 30 segundos
        const container = document.getElementById('container-reports');
        const framesArray = [];
        let currentIndex = 0;

        // 2. INICIALIZAÇÃO: Cria os iframes vazios
        linksBI.forEach((url, index) => {
            const ifrm = document.createElement('iframe');
            
            // Carrega apenas o primeiro imediatamente para forçar o login inicial
            if (index === 0) {
                ifrm.src = url;
                ifrm.classList.add('active');
            } else {
                ifrm.src = "about:blank"; // Deixa os outros em espera
            }

            ifrm.allowFullScreen = true;
            container.appendChild(ifrm);
            framesArray.push(ifrm);
        });

        // 3. FUNÇÃO DE ROTAÇÃO: Carrega o próximo e alterna a visibilidade
        function rodarCarrossel() {
            // Esconde o slide atual
            framesArray[currentIndex].classList.remove('active');

            // Calcula o próximo índice
            currentIndex = (currentIndex + 1) % framesArray.length;

            // VERIFICAÇÃO: Se o próximo iframe ainda não foi carregado, carrega agora
            // Isso aproveita o login feito no primeiro iframe
            if (framesArray[currentIndex].src === "about:blank" || framesArray[currentIndex].src.includes("about:blank")) {
                console.log("Carregando novo relatório no índice: " + currentIndex);
                framesArray[currentIndex].src = linksBI[currentIndex];
            }

            // Exibe o próximo slide
            framesArray[currentIndex].classList.add('active');
            
            console.log("Exibindo Relatório " + (currentIndex + 1));
        }

        // Inicia o temporizador de troca
        setInterval(rodarCarrossel, tempoTrocaSlide);

    </script>
</body>
</html>
