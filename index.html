<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão à Vista - Power BI</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #333; font-family: sans-serif; }
        
        /* Ocupa a tela cheia */
        iframe { width: 100%; height: 100%; border: none; display: none; }
        
        .active { display: block; }
    </style>
</head>
<body>

<iframe id="frame1" src="https://app.powerbi.com/reportEmbed?reportId=8a080e63-782a-4658-b939-c2ddefe372e4&autoAuth=true&ctid=ca4b9034-c4ac-4ca2-b97e-1e57700b0d20&pageName=ReportSectionbde1e6b8d5704cac2ccd"></iframe>
<iframe id="frame2" src="https://app.powerbi.com/reportEmbed?reportId=8a080e63-782a-4658-b939-c2ddefe372e4&autoAuth=true&ctid=ca4b9034-c4ac-4ca2-b97e-1e57700b0d20&pageName=ReportSection16b2b92aec6d5c4ba84c"></iframe>

    <script>
        const tempoTrocaSlide = 30; // 30 segundos
        const frames = document.querySelectorAll('iframe');
        let currentFrame = 0;

        function startCarousel() {
            // Mostra o primeiro frame imediatamente ao carregar a página
            showFrame(currentFrame);

            // Inicia o intervalo de troca
            setInterval(() => {
                currentFrame = (currentFrame + 1) % frames.length;
                showFrame(currentFrame);
            }, tempoTrocaSlide * 1000);
        }

        function showFrame(index) {
            // Esconde todos e mostra apenas o atual
            frames.forEach(f => f.classList.remove('active'));
            frames[index].classList.add('active');
            
            // Recarrega a URL para atualizar os dados do relatório
            const currentSrc = frames[index].src;
            frames[index].src = currentSrc;
        }

        // Inicia assim que o script for lido
        startCarousel();
    </script>
</body>
</html>
