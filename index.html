<body>

    <div id="container-reports" style="width: 100%; height: 100%;"></div>

    <script>
        const tempoTrocaSlide = 30000; // 30 segundos
        const paginas = [
            "ReportSectionc98cd2828de040cb6ad7", // Prog Ferias
            "ReportSection16b2b92aec6d5c4ba84c", // Pendencias documentos
            "ReportSectionbde1e6b8d5704cac2ccd"  // Pendencia n4link
        ];

        const baseEmbedUrl = `https://app.powerbi.com/reportEmbed?reportId=d77b1dfb-e844-462c-a2de-38ed32bcd315&autoAuth=true&ctid=ca4b9034-c4ac-4ca2-b97e-1e57700b0d20&navContentPaneEnabled=false`;

        const container = document.getElementById('container-reports');
        const iframes = [];

        // 1. Criar um iframe para cada aba (carrega tudo no início)
        paginas.forEach((aba, index) => {
            const frame = document.createElement('iframe');
            frame.src = `${baseEmbedUrl}&pageName=${aba}`;
            frame.style.display = (index === 0) ? "block" : "none"; // Só o primeiro fica visível
            frame.allowFullScreen = true;
            container.appendChild(frame);
            iframes.push(frame);
        });

        let currentIndex = 0;

        function rotateReports() {
            // Esconde o iframe atual
            iframes[currentIndex].style.display = "none";

            // Vai para o próximo índice
            currentIndex = (currentIndex + 1) % iframes.length;

            // Mostra o próximo iframe
            iframes[currentIndex].style.display = "block";
            
            console.log("Mostrando aba: " + paginas[currentIndex]);
        }

        // Define o intervalo de troca
        setInterval(rotateReports, tempoTrocaSlide);
    </script>
</body>
