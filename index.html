<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão à Vista - Power BI</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
        .frame-container { position: relative; width: 100%; height: 100%; }
        
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            position: absolute; 
            top: 0; 
            left: 0; 
            visibility: hidden; 
            opacity: 0;
            transition: opacity 0.8s ease-in-out; /* Transição suave entre relatórios */
        }

        .active { 
            visibility: visible; 
            opacity: 1; 
            z-index: 10; 
        }
    </style>
</head>
<body>

    <div id="container-reports" class="frame-container"></div>

    <script>
        // 1. CONFIGURAÇÃO: Coloque aqui os links que você gerou para cada BI
        // Importante: mantenha o "&navContentPaneEnabled=false" no final de cada link para esconder as abas
        const linksBI = [
            "https://app.powerbi.com/reportEmbed?reportId=77a27d25-833b-417f-a8ee-682980c960a4&autoAuth=true&ctid=ca4b9034-c4ac-4ca2-b97e-1e57700b0d20",
            "https://app.powerbi.com/reportEmbed?reportId=fbc2d57e-550d-46e5-b992-a9313761d494&autoAuth=true&ctid=ca4b9034-c4ac-4ca2-b97e-1e57700b0d20",
            "https://app.powerbi.com/reportEmbed?reportId=50b870b0-2741-4ea8-bfed-d95d2cc4df90&autoAuth=true&ctid=ca4b9034-c4ac-4ca2-b97e-1e57700b0d20"
        ];

        const tempoTrocaSlide = 30000; // 30 segundos
        const container = document.getElementById('container-reports');
        const framesArray = [];

        // 2. Criação automática dos iframes
        linksBI.forEach((url, index) => {
            const ifrm = document.createElement('iframe');
            ifrm.src = url;
            ifrm.allowFullScreen = true;
            
            // Define o primeiro como ativo
            if (index === 0) ifrm.classList.add('active');
            
            container.appendChild(ifrm);
            framesArray.push(ifrm);
        });

        let currentIndex = 0;

        // 3. Função de rotação
        function rodarCarrossel() {
            // Esconde o atual
            framesArray[currentIndex].classList.remove('active');

            // Calcula o próximo índice
            currentIndex = (currentIndex + 1) % framesArray.length;

            // Mostra o próximo
            framesArray[currentIndex].classList.add('active');
            
            console.log("Exibindo relatório: " + (currentIndex + 1));
        }

        // Inicia o intervalo
        setInterval(rodarCarrossel, tempoTrocaSlide);

    </script>
</body>
</html>
