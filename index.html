<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão à Vista - Power BI</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <iframe id="display-frame" allowFullScreen="true"></iframe>

    <script>
        // Configurações
        const tempoTrocaSlide = 30000; // 30 segundos
        
        // Lista de páginas baseada nos IDs que você enviou
        const paginas = [
            "ReportSectionc98cd2828de040cb6ad7", // Prog Ferias
            "ReportSection16b2b92aec6d5c4ba84c", // Pendencias documentos
            "ReportSectionbde1e6b8d5704cac2ccd"  // Pendencia n4link
        ];

        const reportId = "8a080e63-782a-4658-b939-c2ddefe372e4";
        const ctid = "ca4b9034-c4ac-4ca2-b97e-1e57700b0d20";
        const baseEmbedUrl = `https://app.powerbi.com/reportEmbed?reportId=${reportId}&ctid=${ctid}&autoAuth=true&navContentPaneEnabled=false`;

        let currentIndex = 0;
        const frame = document.getElementById('display-frame');

        function updateReport() {
            // Criamos uma URL única adicionando um timestamp para evitar cache de sessão
            const timestamp = new Date().getTime();
            const newUrl = `${baseEmbedUrl}&pageName=${paginas[currentIndex]}&nocache=${timestamp}`;
            
            console.log("Carregando aba: " + paginas[currentIndex]);
            
            // Força o frame a ficar visível e carregar a URL
            frame.style.display = "block";
            frame.src = newUrl;

            // Incrementa o índice
            currentIndex = (currentIndex + 1) % paginas.length;
        }

        // Inicia a primeira vez
        updateReport();

        // Define o intervalo de troca
        setInterval(updateReport, tempoTrocaSlide);
    </script>
</body>
</html>
